name: gpsphototag_gui
description: GPSPhotoTag desktop app — GPS photo tagging on macOS, Linux, Windows.
publish_to: 'none'
version: 2.0.0+1
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  gpsphototag_engine:
  gpsphototag_mcp:
  file_selector: ^1.0.3
  url_launcher: ^6.3.0
  cupertino_icons: ^1.0.8
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  image_path: assets/icon_1024.png
  macos:
    generate: true
    image_path: assets/icon_1024.png
  windows:
    generate: true
    image_path: assets/icon_1024.png
  # Linux desktop icons are wired manually from assets/.
