    - assets/exiftool/lib/
    - assets/exiftool/lib/Alien/
    - assets/exiftool/lib/Alien/Base/
    - assets/exiftool/lib/Alien/Build/
    - assets/exiftool/lib/Alien/Build/Interpolate/
