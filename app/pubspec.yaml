    - assets/exiftool/lib/Alien/Build/Plugin/Decode/
    - assets/exiftool/lib/Alien/Build/Plugin/Digest/
    - assets/exiftool/lib/Alien/Build/Plugin/Download/
    - assets/exiftool/lib/Alien/Build/Plugin/Extract/
    - assets/exiftool/lib/Alien/Build/Plugin/Fetch/
