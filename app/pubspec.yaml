name: stunda
description: >-
  Stunda — GPS photo tagging, map exploring, duplicate finding, and library
  shrinking on macOS, Linux, Windows, Android, and iOS.
publish_to: 'none'
version: 2.0.0+1
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  stunda_engine:
  stunda_mcp:
  file_selector: ^1.1.0
  desktop_drop: ^0.7.1
  # Mobile (Android/iOS) device photo-library access: enumerate, metadata,
  # thumbnails, full bytes, and delete. GPS write-back uses a custom channel.
  photo_manager: ^3.9.0
  url_launcher: ^6.3.2
  cupertino_icons: ^1.0.8
  path: ^1.9.1
  path_provider: ^2.1.6
  http: ^1.6.0
  # latlong2 is capped at 0.9.x by flutter_map 8.x (its newest); 0.10.x needs a
  # flutter_map major that doesn't exist yet.
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^8.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  image: ^4.9.1
  # Test-only: mock platform plugins (file picker, app dirs) in widget tests.
  file_selector_platform_interface: ^2.6.0
  path_provider_platform_interface: ^2.1.0
  plugin_platform_interface: ^2.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/i18n/
    # ONNX Runtime lib + detector model (vendored by tool/fetch-onnx.sh).
    # Flutter assets: is non-recursive; each platform subdir is listed.
    - assets/onnx/
    - assets/onnx/osx-arm64/
    - assets/onnx/osx-x64/
    - assets/onnx/linux-x64/
    - assets/onnx/win-x64/
    # --- BEGIN exiftool assets (generated by tool/fetch-exiftool.sh) ---
    # Flutter assets: is non-recursive; every subdir is listed.
    # --- END exiftool assets ---

flutter_launcher_icons:
  image_path: assets/icon_1024.png
  android: true
  ios: true
  # iOS disallows alpha in the app icon; flatten onto a solid background.
  remove_alpha_ios: true
  background_color_ios: "#000000"
  macos:
    generate: true
    image_path: assets/icon_1024.png
  windows:
    generate: true
    image_path: assets/icon_1024.png
  # Linux desktop icons are wired manually from assets/.
