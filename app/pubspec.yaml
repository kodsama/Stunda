name: stunda
description: Stunda desktop app — GPS photo tagging on macOS, Linux, Windows.
publish_to: 'none'
version: 2.0.0+1
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  stunda_engine:
  stunda_mcp:
  file_selector: ^1.0.3
  desktop_drop: ^0.6.1
  url_launcher: ^6.3.0
  cupertino_icons: ^1.0.8
  path: ^1.9.0
  path_provider: ^2.1.4
  http: ^1.2.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^8.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  image: ^4.3.0
  # Test-only: mock platform plugins (file picker, app dirs) in widget tests.
  file_selector_platform_interface: ^2.6.0
  path_provider_platform_interface: ^2.1.0
  plugin_platform_interface: ^2.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/i18n/
    # --- BEGIN exiftool assets (generated by tool/fetch-exiftool.sh) ---
    # Flutter assets: is non-recursive; every subdir is listed.
