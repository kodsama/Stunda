<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Stunda mark: a camera aperture — the instant the shutter opens — a warm
       "moment" of light caught in the iris. Cartographic paper palette. -->
  <defs>
    <clipPath id="bg"><rect width="1024" height="1024" rx="224"/></clipPath>
    <radialGradient id="spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F4C36B"/>
      <stop offset="55%" stop-color="#E0A33A"/>
      <stop offset="100%" stop-color="#C25A3A"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#bg)">
    <rect width="1024" height="1024" fill="#F3EDE1"/>
  </g>

  <g transform="translate(512 512)">
    <!-- lens rim -->
    <circle r="300" fill="none" stroke="#C25A3A" stroke-width="34"/>

    <!-- six aperture blades, rotated copies of one chord; together they ring a
         hexagonal opening -->
    <g stroke="#2E6F6A" stroke-width="30" stroke-linecap="round" fill="none">
      <g>             <line x1="150" y1="-260" x2="280" y2="-34"/></g>
      <g transform="rotate(60)"><line x1="150" y1="-260" x2="280" y2="-34"/></g>
      <g transform="rotate(120)"><line x1="150" y1="-260" x2="280" y2="-34"/></g>
      <g transform="rotate(180)"><line x1="150" y1="-260" x2="280" y2="-34"/></g>
      <g transform="rotate(240)"><line x1="150" y1="-260" x2="280" y2="-34"/></g>
      <g transform="rotate(300)"><line x1="150" y1="-260" x2="280" y2="-34"/></g>
    </g>

    <!-- the caught moment: a warm spark at the centre -->
    <circle r="74" fill="url(#spark)"/>
    <circle cx="-22" cy="-22" r="20" fill="#FBF7EF" opacity="0.85"/>
  </g>
</svg>
