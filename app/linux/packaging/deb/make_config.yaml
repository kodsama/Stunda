# flutter_distributor .deb config.
display_name: Stunda
package_name: stunda
maintainer:
  name: Kodsama
  email: support@kodsama.ai
# Flutter Linux links against system GTK3 at runtime. A real value is also
# required: an empty list renders a valueless "Depends:" line that dpkg-deb
# rejects ("end of file before value of field 'Depends'") — the maker only
# omits the field when it is null, not when it is empty.
dependencies:
  - libgtk-3-0
# Advisory disk-usage metadata (KiB). Required as a non-null int by
# flutter_app_packager's MakeDebConfig.fromJson — omitting it crashes the deb
# target with "type 'Null' is not a subtype of type 'int'". ~256 MB covers the
# uncompressed bundle (Flutter engine + bundled ONNX Runtime + exiftool).
installed_size: 250000
icon: ../packaging/linux/icon_256.png
generic_name: Photo GPS Tagger
keywords:
  - GPS
  - EXIF
  - Photo
  - Geotag
categories:
  - Graphics
  - Photography
priority: optional
section: graphics
