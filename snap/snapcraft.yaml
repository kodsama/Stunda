name: stunda
base: core22
version: '2.0.0'
summary: Tag photos with GPS coordinates from GPX or Google location history
description: |
  Stunda writes GPS EXIF coordinates into your photos by matching their
  timestamps against a GPX track or a Google location history export. It can
  also prune orphan RAW files, fix photo dates, and render a heatmap of where
  your photos were taken.

grade: stable
# strict confinement with the desktop plugs below; the app reads user-selected
# files through the desktop portal and the home/removable-media interfaces.
confinement: strict

# The snapcraft Flutter extension wires the GTK runtime + Flutter toolchain.
apps:
  stunda:
    command: stunda
    extensions: [gnome]
    plugs:
      - home
      - removable-media
      - network

parts:
  stunda:
    source: .
    plugin: flutter
    flutter-target: app/lib/main.dart
