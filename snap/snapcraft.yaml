name: stunda
base: core22
version: '2.0.0'
title: Stunda
license: GPL-3.0-or-later
contact: kodsama@protonmail.com
issues: https://github.com/kodsama/Stunda/issues
source-code: https://github.com/kodsama/Stunda
website: https://github.com/kodsama/Stunda
summary: Tag photos with GPS coordinates from GPX or Google location history
description: |
  Stunda writes GPS EXIF coordinates into your photos by matching their
  timestamps against a GPX track or a Google location history export. It can
  also prune orphan RAW files, fix photo dates, and render a heatmap of where
  your photos were taken.

grade: stable
# strict confinement with the desktop plugs below; the app reads user-selected
# files through the desktop portal and the home/removable-media interfaces.
confinement: strict

# The snapcraft Flutter extension wires the GTK runtime + Flutter toolchain.
apps:
  stunda:
    command: stunda
    extensions: [gnome]
    plugs:
      - home
      - removable-media
      - network

parts:
  stunda:
    # Package the Linux bundle already produced by the `linux` CI job (it is
    # downloaded into this path before snapcraft runs) instead of rebuilding
    # Flutter here. The repo is a pub workspace with no Linux desktop runner at
    # its root, so the snapcraft `flutter` plugin's in-tree `flutter build linux`
    # fails ("No Linux desktop project configured"). The bundle ships `stunda`
    # plus its `lib/` (found via the binary's $ORIGIN/lib rpath) and `data/`.
    plugin: dump
    source: build/linux/x64/release/bundle
