name: stunda_engine
description: >-
  Flutter-free engine that powers both the Stunda desktop GUI and CLI:
  GPS EXIF tagging from GPX / Google location history, RAW pruning, date fixing,
  and heatmap rendering.
version: 2.0.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  meta: ^1.18.0
  collection: ^1.19.1
  path: ^1.9.1
  xml: ^7.0.1
  http: ^1.6.0
  image: ^4.9.1
  archive: ^4.0.9
  ffi: ^2.2.0

dev_dependencies:
  test: ^1.31.0
  lints: ^6.0.0
