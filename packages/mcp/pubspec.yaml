name: stunda_mcp
description: >-
  Model Context Protocol (MCP) server exposing the Stunda engine as tools,
  so LLM clients can tag photos, render heatmaps, prune RAW and fix dates over a
  standard JSON-RPC interface (stdio or local TCP).
version: 2.0.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  stunda_engine:
  http: ^1.6.0
  path: ^1.9.1

dev_dependencies:
  test: ^1.31.0
  lints: ^6.0.0

executables:
  stunda_mcp:
