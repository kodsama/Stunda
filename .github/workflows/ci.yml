name: CI

# Lint + test gate for the Stunda pub workspace (engine, cli, mcp, app).
# Mirrors .githooks/pre-commit, plus a per-package ≥95% line-coverage gate.

on:
  push:
    branches: [main]
  pull_request:

# Pin the toolchain to the versions the repo is developed against.
env:
  FLUTTER_VERSION: 3.44.3
  COVERAGE_MIN: 99

jobs:
  lint-and-test:
    name: Lint, test & coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Print toolchain versions
        run: flutter --version

      # exiftool must be on PATH for the worker-isolate integration tests (they
      # run the real tool) and so the vendor step bundles a reliable system copy
      # rather than a downloaded tarball.
      - name: Install exiftool
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl

      # Resolves the whole workspace (engine, cli, mcp, app) with one lockfile.
      - name: Resolve dependencies
        run: flutter pub get

      # Vendor exiftool into app/assets/exiftool/ and regenerate the pubspec
      # asset list, so the declared bundle asset exists for the app tests/build.
      # Falls back to downloading from exiftool.org when no system exiftool is
      # present (Ubuntu runners ship libimage-exiftool-perl on most images).
      - name: Vendor bundled exiftool
        run: bash tool/fetch-exiftool.sh

      # Vendor the ONNX Runtime native lib + Apache-2.0 SSD-MobileNet model into
      # app/assets/onnx/ so the Tier-2 people/animal detector's integration test
      # (engine) runs and the app build/test sees the declared assets. The Linux
      # runner gets the linux-x64 ORT build; the model is shared.
      - name: Vendor ONNX Runtime + detector model
        run: bash tool/fetch-onnx.sh

      - name: Format check
        # Scoped to source dirs (kept in sync with .githooks/pre-commit) so
        # generated build/ output is never considered.
        run: >
          dart format --output=none --set-exit-if-changed
          packages/engine/lib packages/engine/test
          packages/cli/lib packages/cli/bin packages/cli/test
          packages/mcp/lib packages/mcp/bin packages/mcp/test
          app/lib app/test

      - name: Analyze Dart packages (workspace root)
        run: dart analyze

      - name: Analyze Flutter app
        working-directory: app
        run: flutter analyze

      # --- Tests with coverage -------------------------------------------------
      # Dart packages use package:coverage (dart test --coverage emits a raw
      # coverage dir; format_coverage turns it into lcov). The Flutter app uses
      # the built-in `flutter test --coverage`.
      - name: Activate coverage tooling
        run: dart pub global activate coverage

      - name: Test engine (with coverage)
        working-directory: packages/engine
        run: |
          dart test --coverage=coverage
          dart pub global run coverage:format_coverage \
            --lcov --check-ignore \
            --in=coverage \
            --out=coverage/lcov.info \
            --report-on=lib

      - name: Test cli (with coverage)
        working-directory: packages/cli
        run: |
          dart test --coverage=coverage
          dart pub global run coverage:format_coverage \
            --lcov --check-ignore \
            --in=coverage \
            --out=coverage/lcov.info \
            --report-on=lib

      - name: Test mcp (with coverage)
        working-directory: packages/mcp
        run: |
          dart test --coverage=coverage
          dart pub global run coverage:format_coverage \
            --lcov --check-ignore \
            --in=coverage \
            --out=coverage/lcov.info \
            --report-on=lib

      - name: Test app (with coverage)
        working-directory: app
        run: flutter test --coverage

      # --- Coverage gate (≥95% line coverage per package) ---------------------
      - name: Coverage gate — engine
        run: bash tool/check_coverage.sh packages/engine/coverage/lcov.info "${COVERAGE_MIN}"

      - name: Coverage gate — cli
        run: bash tool/check_coverage.sh packages/cli/coverage/lcov.info "${COVERAGE_MIN}"

      - name: Coverage gate — mcp
        run: bash tool/check_coverage.sh packages/mcp/coverage/lcov.info "${COVERAGE_MIN}"

      - name: Coverage gate — app
        run: bash tool/check_coverage.sh app/coverage/lcov.info "${COVERAGE_MIN}"

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lcov-reports
          path: |
            packages/engine/coverage/lcov.info
            packages/cli/coverage/lcov.info
            packages/mcp/coverage/lcov.info
            app/coverage/lcov.info
          if-no-files-found: warn

  # Desktop build matrix: prove the Flutter app compiles on every supported
  # desktop OS. Each job vendors that OS's exiftool flavour (apt Perl on Linux,
  # the self-contained exe on Windows, the macOS path) + the ONNX Runtime lib,
  # then runs `flutter build <os>`. Correctness of the Windows/Linux resolver
  # branches is unit-tested in lint-and-test (injected-OS seams) so this matrix
  # only needs to confirm the build links and bundles assets.
  build-desktop:
    name: Build ${{ matrix.target }}
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
          - os: windows-latest
            target: windows
          - os: ubuntu-latest
            target: linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Print toolchain versions
        run: flutter --version

      # Linux desktop build deps: GTK + the bits desktop_drop / file_selector
      # need (keybinder, secret service), plus the toolchain CMake/Ninja need.
      - name: Install Linux build deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            libstdc++-12-dev libkeybinder-3.0-dev libsecret-1-dev \
            libimage-exiftool-perl

      - name: Resolve dependencies
        run: flutter pub get

      # Vendor exiftool for the matching OS. Linux/macOS vendor the Perl
      # distribution; Windows additionally fetches the self-contained exe via
      # the --windows flag (Windows has no Perl to run the script).
      - name: Vendor bundled exiftool (Linux/macOS)
        if: matrix.target != 'windows'
        run: bash tool/fetch-exiftool.sh

      - name: Vendor bundled exiftool (Windows self-contained exe)
        if: matrix.target == 'windows'
        shell: bash
        run: bash tool/fetch-exiftool.sh --windows

      # Vendor the host platform's ONNX Runtime lib + the shared detector model
      # so the app's declared assets exist for the build.
      - name: Vendor ONNX Runtime + detector model
        shell: bash
        run: bash tool/fetch-onnx.sh

      - name: Build app
        working-directory: app
        run: flutter build ${{ matrix.target }} --release

      # Tag pushes get the raw build output as a downloadable artifact, aligning
      # with release.yml's intent (which additionally packages installers).
      - name: Upload build artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: |
            app/build/macos/Build/Products/Release/*.app
            app/build/windows/x64/runner/Release/**
            app/build/linux/x64/release/bundle/**
          if-no-files-found: warn

  # Mobile build matrix: prove the Flutter app compiles for Android + iOS.
  # Android pulls the ONNX Runtime AAR + ExifInterface via Gradle; iOS pulls the
  # onnxruntime-c CocoaPod. Both still vendor the host exiftool + ONNX assets so
  # the app's declared `assets:` exist at build time (the engine itself uses the
  # device photo library, not exiftool, on mobile). iOS builds unsigned.
  build-mobile:
    name: Build ${{ matrix.target }}
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: apk
          - os: macos-latest
            target: ios
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (Android)
        if: matrix.target == 'apk'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Print toolchain versions
        run: flutter --version

      # ONNX Runtime ships only as a CocoaPod (no Swift Package), so the iOS
      # build must use CocoaPods integration rather than Flutter 3.44's default
      # Swift Package Manager (mixing the two leaves the Pods sandbox out of
      # sync). Disable SPM before resolving so plugins integrate via CocoaPods.
      - name: Use CocoaPods integration on iOS (disable SPM)
        if: matrix.target == 'ios'
        run: flutter config --no-enable-swift-package-manager

      - name: Resolve dependencies
        run: flutter pub get

      # Mobile bundles no exiftool (engine uses the device photo library) and no
      # desktop ONNX dylibs (Android AAR / iOS pod provide the runtime) — only
      # the .onnx models. This trims ~40-55MB from the app vs. the desktop set.
      - name: Clear exiftool assets (not bundled on mobile)
        run: bash tool/fetch-exiftool.sh --no-exiftool

      - name: Vendor ONNX models only (no desktop libraries)
        run: bash tool/fetch-onnx.sh --models-only

      - name: Build Android APK
        if: matrix.target == 'apk'
        working-directory: app
        run: flutter build apk --debug

      - name: Build iOS (unsigned)
        if: matrix.target == 'ios'
        working-directory: app
        run: flutter build ios --no-codesign --debug
