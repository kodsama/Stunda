name: Release

# Triggered by pushing a version tag (e.g. v2.0.0) on main. Each platform job
# builds the Flutter GUI plus the two Dart CLI/MCP binaries, then everything is
# attached to a single GitHub Release for the tag.
#
# OBFUSCATION: every `flutter build` uses --release --obfuscate
# --split-debug-info=build/symbols/<platform>. The symbols dir is uploaded as a
# per-platform artifact and is REQUIRED to de-obfuscate stack traces from
# release crashes — keep these somewhere durable per release.
#
# SIGNING / STORE PUBLISHING: this workflow produces UNSIGNED artifacts. Real
# distribution (App Store, Play Store, Microsoft Store, notarized macOS, signed
# Windows installers, Snap Store, Flathub) requires credentials configured as
# repository secrets. Steps that need them are guarded with `if: secrets.* != ''`
# and commented where manual setup is required. Do not commit secret values.

on:
  push:
    tags:
      - 'v*'

env:
  FLUTTER_VERSION: 3.44.3

jobs:
  # ---------------------------------------------------------------------------
  android:
    name: Build Android (APK + AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - run: flutter --version
      - run: flutter pub get
      # Mobile bundles no exiftool (the engine uses the device photo library) and
      # no desktop ONNX dylibs (the AAR provides the runtime) — only the models.
      - run: bash tool/fetch-exiftool.sh --no-exiftool
      - run: bash tool/fetch-onnx.sh --models-only

      - name: Build APK (obfuscated)
        working-directory: app
        run: >-
          flutter build apk --release
          --obfuscate --split-debug-info=build/symbols/android

      - name: Build App Bundle (obfuscated)
        working-directory: app
        run: >-
          flutter build appbundle --release
          --obfuscate --split-debug-info=build/symbols/android

      # NOTE: APK/AAB here are signed with the debug key. For Play Store upload,
      # configure an upload keystore via secrets (KEYSTORE_BASE64,
      # KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD) and an android/key.properties.
      - name: Compile Dart CLI/MCP binaries (linux x64)
        run: |
          mkdir -p dist/bin
          dart compile exe packages/cli/bin/stunda.dart -o dist/bin/stunda-linux-x64
          dart compile exe packages/mcp/bin/stunda_mcp.dart -o dist/bin/stunda_mcp-linux-x64

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp app/build/app/outputs/flutter-apk/*.apk dist/ || true
          cp app/build/app/outputs/bundle/release/*.aab dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: android-symbols
          path: app/build/symbols/android
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          # Only the real distributables + CLI binaries — never the whole
          # bundle tree (which would publish exiftool/ONNX assets as junk).
          path: |
            dist/*.apk
            dist/*.aab
            dist/bin/*

  # ---------------------------------------------------------------------------
  ios:
    name: Build iOS (unsigned IPA)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - run: flutter --version
      # ONNX Runtime ships only as a CocoaPod (no Swift Package), so iOS must use
      # CocoaPods integration rather than Flutter's default SPM.
      - run: flutter config --no-enable-swift-package-manager
      - run: flutter pub get
      # Mobile bundles no exiftool (the engine uses the device photo library) and
      # no desktop ONNX dylibs (the pod provides the runtime) — only the models.
      - run: bash tool/fetch-exiftool.sh --no-exiftool
      - run: bash tool/fetch-onnx.sh --models-only

      - name: Build IPA (unsigned, obfuscated)
        working-directory: app
        run: >-
          flutter build ipa --no-codesign --release
          --obfuscate --split-debug-info=build/symbols/ios

      # `flutter build ipa --no-codesign` does not always emit a .ipa. If it
      # didn't, hand-package the unsigned Runner.app into a Payload/ zip.
      # DISTRIBUTION REQUIRES SIGNING: an unsigned IPA cannot be installed on
      # real devices or uploaded to App Store Connect. Configure Apple signing
      # via secrets (BUILD_CERTIFICATE_BASE64, P12_PASSWORD,
      # PROVISIONING_PROFILE_BASE64, APPLE_TEAM_ID) and re-sign / re-export.
      - name: Package unsigned IPA if needed
        working-directory: app
        run: |
          mkdir -p dist
          if ls build/ios/ipa/*.ipa >/dev/null 2>&1; then
            cp build/ios/ipa/*.ipa dist/
          else
            APP_PATH="$(find build/ios -name 'Runner.app' -type d | head -1)"
            if [ -z "$APP_PATH" ]; then
              echo "No Runner.app produced; failing." >&2
              exit 1
            fi
            rm -rf Payload && mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            ( cd "$(dirname Payload)" && zip -qr dist/stunda-unsigned.ipa Payload )
            rm -rf Payload
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ios-symbols
          path: app/build/symbols/ios
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        with:
          name: ios-artifacts
          path: app/dist/*.ipa

  # ---------------------------------------------------------------------------
  macos:
    name: Build macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - run: flutter --version
      - run: flutter pub get
      # Vendor exiftool so the app's declared bundle asset exists for the build.
      - run: bash tool/fetch-exiftool.sh
      # Vendor the ONNX Runtime lib + detector model (declared assets).
      - run: bash tool/fetch-onnx.sh

      - name: Build macOS app (obfuscated)
        working-directory: app
        run: >-
          flutter build macos --release
          --obfuscate --split-debug-info=build/symbols/macos

      - name: Install create-dmg
        run: brew install create-dmg

      # NOTE: the .app is NOT signed or notarized. Gatekeeper will block it on
      # other machines. To distribute, sign + notarize with an Apple Developer
      # ID using secrets (MACOS_CERTIFICATE_BASE64, MACOS_CERTIFICATE_PWD,
      # APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID).
      - name: Create DMG
        working-directory: app
        run: |
          mkdir -p dist
          APP="build/macos/Build/Products/Release/Stunda.app"
          create-dmg \
            --volname "Stunda" \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 150 \
            "dist/Stunda-macos.dmg" \
            "$APP" \
          || create-dmg "dist/Stunda-macos.dmg" "$APP"

      - name: Compile Dart CLI/MCP binaries (macOS)
        run: |
          mkdir -p app/dist/bin
          dart compile exe packages/cli/bin/stunda.dart -o app/dist/bin/stunda-macos
          dart compile exe packages/mcp/bin/stunda_mcp.dart -o app/dist/bin/stunda_mcp-macos

      - uses: actions/upload-artifact@v4
        with:
          name: macos-symbols
          path: app/build/symbols/macos
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            app/dist/*.dmg
            app/dist/bin/*

  # ---------------------------------------------------------------------------
  windows:
    name: Build Windows (.exe installer + .msi + zip)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - run: flutter --version
      - run: flutter pub get
      # Vendor the self-contained Windows exiftool.exe (+ exiftool_files/) so the
      # app's declared bundle assets exist and the tool runs without Perl.
      - name: Vendor bundled exiftool (Windows self-contained exe)
        shell: bash
        run: bash tool/fetch-exiftool.sh --windows

      # Vendor the Windows ONNX Runtime dll + detector model.
      - name: Vendor ONNX Runtime + detector model
        shell: bash
        run: bash tool/fetch-onnx.sh

      - name: Build Windows app (obfuscated)
        working-directory: app
        run: >-
          flutter build windows --release
          --obfuscate --split-debug-info=build/symbols/windows

      - name: Zip raw Release folder
        working-directory: app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -DestinationPath dist/Stunda-windows-x64.zip -Force

      # Inno Setup .exe installer. Compile-and-build via flutter_distributor,
      # which wraps the Inno Setup compiler (iscc). distribute_options.yaml
      # configures the windows/inno target.
      - name: Build .exe installer (Inno Setup via flutter_distributor)
        working-directory: app
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          dart pub global activate flutter_distributor
          flutter_distributor package --platform windows --targets exe
        continue-on-error: true

      # WiX Toolset v3 .msi from packaging/windows/product.wxs.
      # NOTE: edit the GUIDs in product.wxs before first real release.
      - name: Build .msi (WiX v3)
        working-directory: app
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          $wix = "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin"
          if (-not (Test-Path $wix)) { $wix = (Get-ChildItem "${env:ProgramFiles(x86)}\WiX Toolset*\bin")[0].FullName }
          $env:Path = "$wix;$env:Path"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          candle.exe -arch x64 ..\packaging\windows\product.wxs -out dist\product.wixobj `
            -dSourceDir=build\windows\x64\runner\Release
          light.exe dist\product.wixobj -out dist\Stunda-windows-x64.msi
        continue-on-error: true

      - name: Collect installer artifacts
        working-directory: app
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Include *.exe -Path dist | ForEach-Object { Copy-Item $_.FullName dist/ -Force } 2>$null
          if (Test-Path dist/inno) { Get-ChildItem -Recurse dist/inno -Include *.exe | Copy-Item -Destination dist/ -Force }

      # NOTE: the installer/exe/msi are UNSIGNED. Windows SmartScreen will warn.
      # To sign, add a code-signing cert via secrets (WINDOWS_CERT_BASE64,
      # WINDOWS_CERT_PASSWORD) and run signtool on the outputs.
      - uses: actions/upload-artifact@v4
        with:
          name: windows-symbols
          path: app/build/symbols/windows
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            app/dist/*.msi
            app/dist/*.zip
            app/dist/*.exe

  # ---------------------------------------------------------------------------
  linux:
    name: Build Linux (.AppImage + .deb + .rpm + .snap + .flatpak)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            libstdc++-12-dev libkeybinder-3.0-dev libsecret-1-dev \
            rpm patchelf locate fuse

      - run: flutter --version
      - run: flutter pub get
      # Vendor exiftool so the app's declared bundle asset exists for the build.
      - run: bash tool/fetch-exiftool.sh
      # Vendor the ONNX Runtime lib + detector model (declared assets).
      - run: bash tool/fetch-onnx.sh

      - name: Build Linux app (obfuscated)
        working-directory: app
        run: >-
          flutter build linux --release
          --obfuscate --split-debug-info=build/symbols/linux

      # flutter_distributor shells out to `appimagetool`, which isn't preinstalled
      # on the runner. Pin a specific immutable release and verify its SHA-256
      # (no moving `continuous` tag), then run it FUSE-less via
      # APPIMAGE_EXTRACT_AND_RUN below.
      - name: Install appimagetool
        run: |
          sudo wget -qO /usr/local/bin/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage
          echo "ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0  /usr/local/bin/appimagetool" \
            | sha256sum -c -
          sudo chmod +x /usr/local/bin/appimagetool

      # flutter_distributor produces .AppImage, .deb and .rpm from the per-target
      # configs at app/linux/packaging/<target>/make_config.yaml (icon path is
      # resolved relative to this working dir). APPIMAGE_EXTRACT_AND_RUN lets
      # appimagetool run without FUSE, which GitHub runners don't provide. Each
      # target runs independently so one format's failure can't drop the others
      # (the .AppImage is the universal Linux GUI installer).
      - name: Build AppImage / deb / rpm (flutter_distributor)
        working-directory: app
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          dart pub global activate flutter_distributor
          export PATH="$PATH:$HOME/.pub-cache/bin"
          flutter_distributor package --platform linux --targets appimage || true
          flutter_distributor package --platform linux --targets deb || true
          flutter_distributor package --platform linux --targets rpm || true

      - name: Compile Dart CLI/MCP binaries (linux x64)
        run: |
          mkdir -p app/dist/bin
          dart compile exe packages/cli/bin/stunda.dart -o app/dist/bin/stunda-linux-x64
          dart compile exe packages/mcp/bin/stunda_mcp.dart -o app/dist/bin/stunda_mcp-linux-x64

      # flutter_distributor writes installers under app/dist/<version>/; lift them
      # to app/dist/ (top level) so the upload glob below picks them up.
      - name: Collect distributor outputs
        run: |
          mkdir -p app/dist
          find app/dist -mindepth 2 -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) \
            -exec cp {} app/dist/ \; 2>/dev/null || true
          ls -la app/dist

      - uses: actions/upload-artifact@v4
        with:
          name: linux-symbols
          path: app/build/symbols/linux
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            app/dist/*.AppImage
            app/dist/*.deb
            app/dist/*.rpm
            app/dist/bin/*

  # --- Snap (separate job: uses the snapcraft action) ------------------------
  linux-snap:
    name: Build Linux (.snap)
    runs-on: ubuntu-latest
    # Best-effort extra format: snapcraft in CI is finicky, so a failure here
    # must not block the release of the core artifacts.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Build snap
        id: snapcraft
        uses: snapcore/action-build@v1

      - uses: actions/upload-artifact@v4
        with:
          name: linux-snap
          path: ${{ steps.snapcraft.outputs.snap }}
          if-no-files-found: warn

      # NOTE: publishing to the Snap Store needs a login token. Use
      # snapcore/action-publish@v1 with secrets.SNAPCRAFT_STORE_CREDENTIALS.

  # --- Flatpak (separate job: uses the flatpak-builder action) ---------------
  linux-flatpak:
    name: Build Linux (.flatpak)
    runs-on: ubuntu-latest
    # Best-effort extra format (see linux-snap) — non-blocking for the release.
    continue-on-error: true
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-23.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Build flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: stunda.flatpak
          manifest-path: packaging/flatpak/ai.kodsama.Stunda.yml
          cache-key: flatpak-builder-${{ github.sha }}

      # NOTE: publishing to Flathub is a separate PR-based submission to the
      # flathub/<app-id> repository; it is not done from this workflow.
      - uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: stunda.flatpak
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    # Gate on the core platform artifacts; snap/flatpak are best-effort extras
    # (continue-on-error) and are included only if they happen to finish in time.
    needs: [android, ios, macos, windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          # action-gh-release reads the tag from the triggering ref.
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            artifacts/**/*
