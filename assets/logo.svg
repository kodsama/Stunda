<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Stunda logo">
  <title>Stunda</title>
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b4150"/>
      <stop offset="1" stop-color="#1f2330"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1116"/>
      <stop offset="1" stop-color="#2a2f3a"/>
    </linearGradient>
    <radialGradient id="glassGrad" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#6ec1ff" stop-opacity="0.9"/>
      <stop offset="0.7" stop-color="#1a4673"/>
      <stop offset="1" stop-color="#0a1d33"/>
    </radialGradient>
    <linearGradient id="pinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6a5b"/>
      <stop offset="1" stop-color="#d23a2a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="offset"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- camera body -->
  <g filter="url(#shadow)">
    <rect x="56" y="148" width="400" height="276" rx="34" fill="url(#bodyGrad)"/>
    <!-- viewfinder hump -->
    <path d="M170 148 l24 -44 h124 l24 44 z" fill="url(#bodyGrad)"/>
    <!-- top bar accent -->
    <rect x="56" y="148" width="400" height="14" rx="7" fill="#0e1116" opacity="0.6"/>
    <!-- shutter button -->
    <circle cx="408" cy="132" r="14" fill="#c7cdd8"/>
    <circle cx="408" cy="132" r="6"  fill="#7e8593"/>
    <!-- mode dial -->
    <circle cx="120" cy="132" r="16" fill="#2a2f3a" stroke="#0e1116" stroke-width="2"/>
    <!-- flash window -->
    <rect x="86" y="170" width="44" height="16" rx="3" fill="#fff7c2" opacity="0.85"/>
    <!-- lens -->
    <circle cx="256" cy="298" r="118" fill="url(#lensGrad)"/>
    <circle cx="256" cy="298" r="98"  fill="#0a0c12"/>
    <circle cx="256" cy="298" r="84"  fill="url(#glassGrad)"/>
    <!-- glass highlight -->
    <ellipse cx="222" cy="266" rx="32" ry="20" fill="#ffffff" opacity="0.18"/>
  </g>

  <!-- map pin overlay -->
  <g transform="translate(316 60)" filter="url(#shadow)">
    <path d="M70 0 C31 0 0 31 0 70 c0 49 70 130 70 130 s70 -81 70 -130 C140 31 109 0 70 0 z" fill="url(#pinGrad)"/>
    <circle cx="70" cy="70" r="28" fill="#ffffff"/>
    <circle cx="70" cy="70" r="14" fill="#d23a2a"/>
  </g>
</svg>
